{% extends "base.html" %}

{% block extra_css %}
<style>
    .contact-hero {
        text-align: center;
        padding: 4rem 0 2rem;
    }
    .contact-hero h1 {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -1px;
    }
    .contact-card {
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 16px;
        padding: 2.5rem;
        transition: all 0.3s;
        text-align: center;
    }
    [data-bs-theme="dark"] .contact-card {
        border-color: rgba(255,255,255,0.06);
    }
    .contact-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }
    .contact-icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: var(--orange-subtle);
        color: var(--orange);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        margin-bottom: 1rem;
    }
    .contact-form textarea {
        resize: none;
    }
    .contact-form .form-control:focus {
        border-color: var(--orange);
        box-shadow: 0 0 0 3px rgba(232,101,26,0.12);
    }
</style>
{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px;">
    <div class="contact-hero reveal">
        <h1>Get In <span class="text-orange">Touch</span></h1>
        <p class="text-muted mt-2">We'd love to hear from you. Reach out anytime.</p>
    </div>

    <!-- Contact Info Cards -->
    <div class="row g-4 mb-5">
        <div class="col-md-4 reveal reveal-delay-1">
            <div class="contact-card h-100">
                <div class="contact-icon"><i class="fas fa-phone"></i></div>
                <h6 class="fw-bold">Phone</h6>
                <p class="text-muted small mb-0">010-1234-5678</p>
            </div>
        </div>
        <div class="col-md-4 reveal reveal-delay-2">
            <div class="contact-card h-100">
                <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                <h6 class="fw-bold">Email</h6>
                <p class="text-muted small mb-0">team_awesome@example.com</p>
            </div>
        </div>
        <div class="col-md-4 reveal reveal-delay-3">
            <div class="contact-card h-100">
                <div class="contact-icon"><i class="fab fa-github"></i></div>
                <h6 class="fw-bold">GitHub</h6>
                <p class="text-muted small mb-0">github.com/oss-team</p>
            </div>
        </div>
    </div>

    <!-- Contact Form -->
    <div class="reveal reveal-delay-4">
        <div class="contact-card contact-form" style="text-align: left;">
            <h5 class="fw-bold mb-4">Send us a message</h5>
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Name</label>
                        <input type="text" class="form-control" placeholder="Your name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Email</label>
                        <input type="email" class="form-control" placeholder="you@example.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Message</label>
                        <textarea class="form-control" rows="4" placeholder="How can we help?"></textarea>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-orange">
                            Send Message <i class="fas fa-paper-plane ms-1"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
