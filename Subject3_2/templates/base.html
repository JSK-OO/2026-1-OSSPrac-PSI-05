<!DOCTYPE html>
<html lang="ko" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS Project Team</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome (GitHub, Email 아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Devicon (기술 스택 로고) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
    <!-- 폰트 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        /* 애니메이션 효과 */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        /* 카드 및 호버 효과 */
        .custom-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .custom-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        /* 글자 좌우 정렬을 위한 클래스 */
        .text-justify {
            text-align: justify;
        }
    </style>
</head>
<body class="bg-body-tertiary">

    <!-- 상단 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚀 OSS Team</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">팀 소개</a></li>
                    <li class="nav-item"><a class="nav-link" href="/input">데이터 입력</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">문의하기</a></li>
                </ul>
                <button class="btn btn-outline-light btn-sm" id="darkModeToggle">
                    <i class="fas fa-moon"></i> 다크모드
                </button>
            </div>
        </div>
    </nav>

    <!-- 본문 내용 (자식 템플릿이 들어갈 자리) -->
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS & 다크모드 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleBtn = document.getElementById('darkModeToggle');
        const htmlElement = document.documentElement;
        
        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            toggleBtn.innerHTML = newTheme === 'light' ? '<i class="fas fa-moon"></i> 다크모드' : '<i class="fas fa-sun"></i> 라이트모드';
        });
    </script>
</body>
</html>
