<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <style>
        /* 화면 전체 내용을 중앙 정렬 */
        body {
            text-align: center;
            margin-top: 50px;
            font-family: sans-serif;
        }

        /* 팝업창(다이얼로그) 디자인 */
        dialog {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        /* 팝업창 떴을 때 배경 어둡게 처리 */
        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }

        /* 버튼 디자인 */
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
        .btn:hover {
            background-color: #e2e6ea;
        }
    </style>
</head>
<body>
    <h1>문의하기</h1>
    <p>팀에게 문의할 내용이 있다면 이 페이지를 활용하세요.</p>

    <br>
    <!-- 팝업창을 여는 버튼 -->
    <button class="btn" onclick="document.getElementById('contact-popup').showModal()">📞 연락처 확인하기</button>

    <!-- 숨겨져 있다가 뜨는 팝업창 영역 -->
    <dialog id="contact-popup">
        <h2>연락처</h2>
        <p>📱 전화번호: 010-1234-5678</p>
        <p>📧 이메일: team_awesome@example.com</p>
        <br>
        <!-- 팝업창 닫기 버튼 -->
        <button class="btn" onclick="document.getElementById('contact-popup').close()">닫기</button>
    </dialog>

</body>
</html>
